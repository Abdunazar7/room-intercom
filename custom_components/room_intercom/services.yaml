start_call:
  name: Start call
  description: >-
    Point one or more speakers at a live intercom stream. Normally called by
    the Room Intercom card, not by hand.
  fields:
    session:
      name: Session
      description: Unique session id generated by the card.
      required: true
      example: "ic_8f3a2b"
      selector:
        text:
    token:
      name: Token
      description: Random per-session token generated by the card.
      required: true
      example: "a1b2c3d4e5f6"
      selector:
        text:
    entity_id:
      name: Target speakers
      description: Speakers that should play the intercom audio.
      required: true
      selector:
        entity:
          multiple: true
          domain: media_player
    volume:
      name: Volume
      description: Optional volume to set on the targets before playing.
      required: false
      selector:
        number:
          min: 0
          max: 1
          step: 0.05

stop_call:
  name: Stop call
  description: Stop the speakers and tear down the intercom session.
  fields:
    session:
      name: Session
      description: The session id to close.
      required: true
      example: "ic_8f3a2b"
      selector:
        text:
    entity_id:
      name: Target speakers
      description: Speakers to stop.
      required: false
      selector:
        entity:
          multiple: true
          domain: media_player
